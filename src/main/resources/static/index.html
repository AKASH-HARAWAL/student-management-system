<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background-color: #f4f4f4;
    }

    input {
        padding: 10px;
        width: 300px;
    }

    button {
        padding: 8px 12px;
        margin: 5px;
        cursor: pointer;
    }

    li {
        background: white;
        margin: 10px 0;
        padding: 10px;
        list-style: none;
        border-radius: 5px;
    }
    .card {
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
}
button {
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}
body {
    background: linear-gradient(to right, #f5f7fa, #c3cfe2);
    min-height: 100vh;
}
</style>
</head>
<body onload="loadStudents()" class="bg-light">
<div class="container mt-5">
    <nav class="navbar navbar-dark bg-dark mb-4 rounded animate__animated animate__fadeInDown">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
            Student Management System
        </span>
    </div>
</nav>
<div class="alert alert-primary text-center animate__animated animate__fadeIn">
    <h4>Welcome to Student Management System</h4>
</div>
<button onclick="toggleDarkMode()"
        class="btn btn-dark mb-3">
    Toggle Dark Mode
</button>
<div id="loading" style="display:none;">
    <div class="alert alert-info">
        Loading...
    </div>
</div>
<div class="card p-3 mb-4">

    <h3 class="text-center">
        Add / Update Student
    </h3>
</div>

<div id="message"></div>
    <div class="mb-3">
    <input type="text" id="name" class="form-control" placeholder="Enter Name">
</div>

<div class="mb-3">
    <input type="email" id="email" class="form-control" placeholder="Enter Email">
</div>

<div class="mb-3">
    <input type="text" id="department" class="form-control" placeholder="Enter Department">
</div>

<div class="mb-3">
    <input type="number" id="cgpa" class="form-control" placeholder="Enter CGPA">
    <div class="mb-3">
    <input type="text"
           id="imageUrl"
           class="form-control"
           placeholder="Enter Image URL">
</div>
</div>
    <button onclick="addStudent()" class="btn btn-primary">
    Add Student
</button>

<button onclick="clearForm()" class="btn btn-secondary ms-2">
    Clear
</button>
    
<br><br>

<h4 class="mt-4 mb-3">
    Search Students
</h4>
<input type="text" id="searchDept" placeholder="Search by Department">

<button onclick="searchByDepartment()"
        class="btn btn-primary">
    Search
</button>

<br><br>

<input type="text"
       id="searchName"
       class="form-control"
       placeholder="Search by Name">

<br>

<button onclick="loadStudents()"
        class="btn btn-dark">
    Show All Students
    
</button>

<button onclick="exportStudents()" class="btn btn-success ms-2">
    Export Students
</button>

<div class="card p-3 mb-3 bg-primary text-white">
    <h4 id="studentCount"></h4>
</div>
<ul id="studentList"></ul>

    <script>
    
    let editId = null;

    function addStudent() {
    	

        const student = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            department: document.getElementById("department").value,
            cgpa: document.getElementById("cgpa").value,
            imageUrl: document.getElementById("imageUrl").value
        };

        let url = "http://localhost:8081/students";
        let method = "POST";

        if (editId !== null) {
            url = `http://localhost:8081/students/${editId}`;
            method = "PUT";
        }

        fetch(url, {
            method: method,
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(student)
        })
        .then(response => response.json())
        .then(data => {

            document.getElementById("message").innerHTML = `
                <div class="alert alert-success">
                    ${editId === null
                        ? "Student Added Successfully"
                        : "Student Updated Successfully"}
                </div>
            `;

            setTimeout(() => {
                document.getElementById("message").innerHTML = "";
            }, 3000);

            editId = null;

            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("department").value = "";
            document.getElementById("cgpa").value = "";

            loadStudents();
        });
    }

    function loadStudents() {
    	document.getElementById("loading").style.display = "block";
        fetch("http://localhost:8081/students")
        .then(response => response.json())
        .then(data => {

            let output = "";
            if (data.length === 0) {

                document.getElementById("studentList").innerHTML = `
                    <div class="alert alert-warning">
                        No Students Found
                    </div>
                `;

                document.getElementById("loading").style.display = "none";

                return;
            }

            data.forEach(student => {

            	output += `
            	    <div class="card p-3 mb-3">

            	        <img src="${student.imageUrl}"
            	             width="100"
            	             height="100"
            	             style="border-radius:50%; object-fit:cover;">

            	        <h5>${student.name}</h5>

            	        <p>
            	            ${student.email}<br>
            	            ${student.department}<br>
            	            CGPA: ${student.cgpa}
            	        </p>

            	        <button class="btn btn-danger btn-sm mt-2"
            	            onclick="deleteStudent(${student.id})">
            	        Delete
            	    </button>
            		<button class="btn btn-warning btn-sm mt-2"
                    onclick="editStudent(
                        ${student.id},
                        '${student.name}',
                        '${student.email}',
                        '${student.department}',
                        ${student.cgpa}
                    )">
                Edit
            </button>

            	    </div>
            	`;
            });

            document.getElementById("studentList").innerHTML = output;
            document.getElementById("loading").style.display = "none";
            document.getElementById("studentCount").innerHTML =
                "Total Students: " + data.length;
        });
    }
    function deleteStudent(id) {
    	if (!confirm("Are you sure you want to delete this student?")) {
    	    return;
    	}

        fetch(`http://localhost:8081/students/${id}`, {
            method: "DELETE"
        })
        .then(response => response.text())
        .then(data => {
        	document.getElementById("message").innerHTML = `
        		setTimeout(() => {
        	    document.getElementById("message").innerHTML = "";
        	}, 3000);
        	    <div class="alert alert-danger">
        	        ${data}
        	    </div>
        	`;
            loadStudents();
        });
    }
    function editStudent(id, name, email, department, cgpa) {

        editId = id;

        document.getElementById("name").value = name;
        document.getElementById("email").value = email;
        document.getElementById("department").value = department;
        document.getElementById("cgpa").value = cgpa;
    }
    
    function searchByDepartment() {

        const department = document.getElementById("searchDept").value;

        fetch(`http://localhost:8081/students/department/${department}`)
        .then(response => response.json())
        .then(data => {

            let output = "";

            data.forEach(student => {
                output += `
                    <li>
                        ${student.name} -
                        ${student.email} -
                        ${student.department} -
                        ${student.cgpa}
                    </li>
                `;
            });

            document.getElementById("studentList").innerHTML = output;
        });
    }
    function clearForm() {

        editId = null;

        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("department").value = "";
        document.getElementById("cgpa").value = "";
    }
    function searchByName() {

        const name = document.getElementById("searchName").value;

        fetch(`http://localhost:8081/students/name/${name}`)
        .then(response => response.json())
        .then(data => {

            let output = "";

            data.forEach(student => {

                output += `
                    <div class="card p-3 mb-3">

                        <h5>${student.name}</h5>

                        <p>
                            ${student.email}<br>
                            ${student.department}<br>
                            CGPA: ${student.cgpa}
                        </p>

                    </div>
                `;
            });

            document.getElementById("studentList").innerHTML = output;
        });
    }
    function toggleDarkMode() {

        document.body.classList.toggle("bg-dark");
        document.body.classList.toggle("text-white");
    }
    function exportStudents() {

        fetch("http://localhost:8081/students")
        .then(response => response.json())
        .then(data => {

            let content = "Name,Email,Department,CGPA\n";

            data.forEach(student => {

                content += `${student.name},
    ${student.email},
    ${student.department},
    ${student.cgpa}\n`;
            });

            const blob = new Blob([content],
            { type: "text/csv" });

            const url = window.URL.createObjectURL(blob);

            const a = document.createElement("a");

            a.href = url;
            a.download = "students.csv";

            a.click();
        });
    }

</script>

</div>
<footer class="text-center mt-5 p-3 bg-dark text-white rounded">
    <p class="mb-0">
        &copy; 2026 Student Management System | Developed by Akash
    </p>
</footer>
</body>
</html>
